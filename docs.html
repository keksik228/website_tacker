<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Документация</title>
  <link rel="stylesheet" href="main.css">
  <style>
    .docs-list-grid {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 0 0 48px;
    }
    .docs-ktk-card {
      background: #fff;
      border-radius: 18px;
      padding: 18px 22px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: transform .18s, box-shadow .18s, border-color .18s;
      text-decoration: none;
    }
    .docs-ktk-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(0,0,0,.1);
      border-color: rgba(149,255,143,.5);
    }
    .docs-ktk-left { display: flex; flex-direction: column; gap: 4px; }
    .docs-ktk-id   { font-size: 17px; font-weight: 700; color: #111; }
    .docs-ktk-route { font-size: 13px; color: var(--muted); }
    .docs-ktk-right { display: flex; align-items: center; gap: 10px; }
    .docs-page-title {
      max-width: 860px;
      margin: 0 auto 20px;
      font-size: 24px;
      font-weight: 800;
      color: #111;
    }
  </style>
</head>
<body>

  <header class="header">
    <a class="header-user" href="settings.html">
      <div class="avatar-container">
        <img src="user.svg" alt="Avatar" class="avatar-img">
      </div>
      <div class="account-info">
        <span class="username" id="header-username">—</span>
        <span class="phone"    id="header-phone">—</span>
      </div>
    </a>
    <a class="header-logo" href="main.html">
      <img src="logo.svg" alt="Логотип компании" class="logo-img">
    </a>
  </header>

  <div class="docs-page-title">Документация</div>
  <div class="docs-list-grid" id="docs-list-container">
    <div class="loading-msg">Загрузка...</div>
  </div>

  <script src="main_script.js"></script>
  <script>
    window.__docsListMode = true;
  </script>
</body>
</html>
