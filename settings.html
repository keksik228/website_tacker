<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки</title>
    <link rel="stylesheet" href="main.css">
    <style>
        body { background-color: #e9e9e9; padding: 0; }

        .settings-wrapper {
            max-width: 1240px;
            margin: 0 auto;
            padding: 0 0 40px 0;
        }

        .settings-card {
            background-color: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            max-width: 620px;
            margin: 0 auto;
        }

        .settings-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 22px 28px;
            text-decoration: none;
            color: #222222;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: background-color 0.18s ease;
            border-bottom: 1px solid #f0f0f0;
        }
        .settings-item:last-child { border-bottom: none; }
        .settings-item:hover { background-color: #f7f7f7; }

        /* Фиксированный размер для SVG и IMG иконок */
        .settings-icon,
        .settings-item > img {
            width: 24px;
            height: 24px;
            min-width: 24px;
            min-height: 24px;
            flex-shrink: 0;
            object-fit: contain;
        }

        .settings-label {
            flex: 1;
            font-size: 20px;
            font-weight: 400;
            color: #222222;
        }

        .settings-arrow {
            width: 18px;
            height: 18px;
            min-width: 18px;
            flex-shrink: 0;
            stroke: #555;
            fill: none;
        }
    </style>
</head>
<body>

    <header class="header">
        <a class="header-user" href="settings.html">
            <div class="avatar-container">
                <img src="user.svg" alt="Avatar" class="avatar-img">
            </div>
            <div class="account-info">
                <span class="username" id="header-username">—</span>
                <span class="phone"    id="header-phone">—</span>
            </div>
        </a>
        <a class="header-logo" href="main.html">
            <img src="logo.svg" alt="Логотип компании" class="logo-img">
        </a>
    </header>

    <div class="settings-wrapper">
        <div class="settings-card">

            <a class="settings-item" href="docs.html">
                <img src="free-icon-document-3936484 1.svg" alt="">
                <span class="settings-label">Документация</span>
                <svg class="settings-arrow" viewBox="0 0 24 24" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            </a>

            <a class="settings-item" href="#">
                <img src="vopros.svg" alt="">
                <span class="settings-label">Помощь</span>
                <svg class="settings-arrow" viewBox="0 0 24 24" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            </a>

            <a class="settings-item" href="#">
                <img src="check.svg" alt="">
                <span class="settings-label">Чеки</span>
                <svg class="settings-arrow" viewBox="0 0 24 24" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            </a>

            <a class="settings-item" href="index.html">
                <img src="exit.svg" alt="">
                <span class="settings-label">Выход</span>
                <svg class="settings-arrow" viewBox="0 0 24 24" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            </a>

        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
        if (user.username) document.getElementById('header-username').textContent = user.username;
        if (user.phone)    document.getElementById('header-phone').textContent    = user.phone;
    </script>
</body>
</html>
