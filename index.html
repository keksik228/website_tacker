<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-card">
    <h1 class="login-title">Login</h1>
    <div class="account-list">

      <button class="account-item" onclick="login('User_1')">
        <div class="avatar-wrap">
          <img src="user.svg" alt="User 1" class="avatar-img">
        </div>
        <div class="account-info">
          <span class="username">User_1</span>
          <span class="phone">+7 123 456 79 10</span>
        </div>
      </button>

      <button class="account-item" onclick="login('User_2')">
        <div class="avatar-wrap">
          <img src="user.svg" alt="User 2" class="avatar-img">
        </div>
        <div class="account-info">
          <span class="username">User_2</span>
          <span class="phone">+7 987 654 32 10</span>
        </div>
      </button>

      <button class="account-item add-account">
        <div class="avatar-wrap plus-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28">
            <line x1="12" y1="5" x2="12" y2="19" stroke-linecap="round"/>
            <line x1="5" y1="12" x2="19" y2="12" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="account-info">
          <span class="add-text">Добавить аккаунт</span>
        </div>
      </button>

    </div>
  </div>
  <script src="vhod.js"></script>
</body>
</html>
